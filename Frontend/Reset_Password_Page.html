<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Reset Password | ChicagoInsider</title>
  <link rel="stylesheet" href="Auth.css?v=1" />
</head>
<body class="auth-page" data-auth-page="reset">
  <main class="auth-scene">
    <section class="auth-card" aria-label="Reset password">
      <a class="auth-brand" href="Home_Page.html">
        <img src="assets/chicago-logo.svg" alt="" />
        ChicagoInsider
      </a>
      <h1>Choose a new password</h1>
      <p class="auth-subtitle">Use the reset link from your email, then save a new password.</p>

      <form class="auth-form" data-auth-form>
        <div class="auth-input-wrap">
          <input name="password" type="password" placeholder="New password" autocomplete="new-password" minlength="8" required />
          <button class="auth-toggle-password" type="button" data-toggle-password aria-label="Show password"></button>
        </div>
        <input name="confirmPassword" type="password" placeholder="Confirm new password" autocomplete="new-password" minlength="8" required />
        <p class="auth-message" id="authMessage" role="status"></p>
        <button class="auth-button" type="submit">Update password</button>
      </form>

      <a class="auth-secondary" href="Login_Page.html">Back to Sign In</a>
    </section>
  </main>

  <script src="Auth_Client.js?v=1"></script>
  <script src="Auth_Pages.js?v=1"></script>
</body>
</html>
