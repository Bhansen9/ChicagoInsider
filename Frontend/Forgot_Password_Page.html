<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Forgot Password | ChicagoInsider</title>
  <link rel="stylesheet" href="Auth.css?v=1" />
</head>
<body class="auth-page" data-auth-page="forgot">
  <main class="auth-scene">
    <section class="auth-card" aria-label="Forgot password">
      <a class="auth-brand" href="Home_Page.html">
        <img src="assets/chicago-logo.svg" alt="" />
        ChicagoInsider
      </a>
      <h1>Reset password</h1>
      <p class="auth-subtitle">Enter your email and we will send a reset link.</p>

      <form class="auth-form" data-auth-form>
        <input name="email" type="email" placeholder="Email Address" autocomplete="email" required />
        <p class="auth-message" id="authMessage" role="status"></p>
        <button class="auth-button" type="submit">Send reset link</button>
      </form>

      <a class="auth-secondary" href="Login_Page.html">Back to Sign In</a>
    </section>
  </main>

  <script src="Auth_Client.js?v=1"></script>
  <script src="Auth_Pages.js?v=1"></script>
</body>
</html>
