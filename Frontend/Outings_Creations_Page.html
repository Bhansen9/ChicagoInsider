<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Create Outing | ChicagoInsider</title>
  <link rel="stylesheet" href="Outings_Creations_Page.css?v=29" />
  <link rel="stylesheet" href="Skeleton_Loaders.css?v=2" />
  <link rel="stylesheet" href="Auth.css?v=1" />
</head>
<body>
  <div class="creation-shell">
    <header class="creation-header">
      <nav class="creation-nav" aria-label="Outing editor navigation">
        <a class="brand-icon" href="Plan_Outings.html" aria-label="Back to outings">
          <img src="assets/chicago-logo.svg" alt="" />
        </a>
        <a href="Plan_Outings.html">Outings</a>
      </nav>

      <h1><a href="Home_Page.html">ChicagoInsider</a></h1>

      <div class="header-actions">
        <button id="headerShareBtn" type="button">Share
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path d="M12 3v10"></path>
            <path d="M8 7l4-4 4 4"></path>
            <path d="M5 12v7h14v-7"></path>
          </svg>
        </button>
        <button class="icon-pill" type="button" aria-label="Copy link">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path d="M10 13a5 5 0 0 0 7.07 0l2-2a5 5 0 0 0-7.07-7.07l-1.16 1.16"></path>
            <path d="M14 11a5 5 0 0 0-7.07 0l-2 2A5 5 0 0 0 12 20.07l1.16-1.16"></path>
          </svg>
        </button>
        <a class="avatar-pill" href="Profile_Page.html" aria-label="Open profile" data-auth-avatar>B</a>
      </div>

      <div class="menu-row">
        <div class="file-menu-wrap">
          <button id="fileMenuBtn" type="button">File</button>
          <div class="file-menu" id="fileMenu" aria-label="File options">
            <button type="button" data-file-action="new">New</button>
            <button type="button" data-file-action="download">Download</button>
            <button type="button" data-file-action="share">Share</button>
            <button type="button" data-file-action="email">Email</button>
            <button type="button" data-file-action="rename">Rename</button>
            <button type="button" data-file-action="delete">Delete Outing</button>
          </div>
        </div>
        <div class="edit-menu-wrap">
          <button id="editMenuBtn" type="button">Edit</button>
          <div class="edit-menu" id="editMenu" aria-label="Edit options">
            <button type="button" data-edit-action="undo">Undo</button>
            <button type="button" data-edit-action="redo">Redo</button>
          </div>
        </div>
      </div>
    </header>

    <main class="creation-layout">
      <aside class="collections-pane" aria-label="Collections Playbook">
        <div class="pane-heading">
          <h2>Collections Playbook</h2>
          <button class="playbook-options-button" id="playbookOptionsBtn" type="button" aria-label="Open Playbook options">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="M2 5h20"></path>
              <path d="M6 12h12"></path>
              <path d="M9 19h6"></path>
            </svg>
          </button>
          <div class="playbook-options-menu" id="playbookOptionsMenu" aria-label="Playbook options">
            <button type="button" data-action="clear">Clear</button>
            <button type="button" data-action="budget">Budget $ - $$$</button>
            <button type="button" data-action="neighborhood">Neighborhood</button>
          </div>
        </div>

        <div class="collections-list" id="creationPlaybookList"></div>
      </aside>

      <section class="planner-canvas" aria-label="Outing timeline">
        <div class="canvas-toolbar">
          <label class="outing-title-field" for="outingTitleInput">
            <input id="outingTitleInput" type="text" value="Untitled Outing" aria-label="Outing title" />
          </label>
          <span class="autosave-status" id="autosaveStatus" data-state="idle">Saved</span>
          <label class="outing-date-field" for="outingDateInput">
            <input id="outingDateInput" type="date" value="2026-05-29" />
          </label>
          <label class="timeframe-field" for="timeframeSelect">
            <span>TimeFrame:</span>
            <input id="timeframeSelect" type="text" value="Evening: 5 PM - 9 PM" list="timeframeOptions" aria-label="Outing timeframe" />
            <datalist id="timeframeOptions">
              <option value="Morning: 9 AM - 12 PM"></option>
              <option value="Afternoon: 12 PM - 4 PM"></option>
              <option value="Evening: 5 PM - 9 PM"></option>
              <option value="Night: 8 PM - 12 AM"></option>
              <option value="Late Night: 10 PM - 2 AM"></option>
              <option value="All Day: 10 AM - 10 PM"></option>
            </datalist>
          </label>
        </div>
        <div class="canvas-drop-zone" id="canvasDropZone" aria-label="Workspace drop zone"></div>
      </section>

      <aside class="details-pane" aria-label="Outing details">
        <section>
          <h2>Map View</h2>
          <div class="map-card google-map-preview" id="outingMapPreview" aria-label="Playbook places map">
            Loading map...
          </div>
        </section>

        <section>
          <h2>Contributors
            <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"></path><circle cx="9" cy="7" r="4"></circle><path d="M22 21v-2a4 4 0 0 0-3-3.87"></path><path d="M16 3.13a4 4 0 0 1 0 7.75"></path></svg>
          </h2>
          <div class="contributors-card" id="contributorsCard">
            <button class="add-contributor-button" id="addContributorPanelBtn" type="button">
              Add New Contributors
              <span aria-hidden="true">+</span>
            </button>
          </div>
        </section>

        <section>
          <h2>Budget Estimate <span class="money-icon">$</span></h2>
          <div class="budget-card" id="budgetCard"></div>
        </section>
      </aside>
    </main>

    <div class="share-dialog-backdrop" id="shareDialog" aria-hidden="true">
      <section class="share-dialog" role="dialog" aria-modal="true" aria-labelledby="shareDialogTitle">
        <div class="share-dialog-header">
          <h2 id="shareDialogTitle">Share Outing</h2>
          <button id="closeShareDialogBtn" type="button" aria-label="Close share dialog">x</button>
        </div>
        <label for="shareUsernameInput">Username</label>
        <div class="share-input-row">
          <input id="shareUsernameInput" type="text" placeholder="ben, trevor, alex..." autocomplete="off" />
          <select id="shareRoleSelect" aria-label="Contributor privilege">
            <option value="write">Can write</option>
            <option value="suggest">Can suggest</option>
            <option value="read">Can read</option>
          </select>
          <button id="addShareUserBtn" type="button">Share</button>
        </div>
        <div class="share-results" id="shareResults"></div>
        <div class="shared-users" id="sharedUsers"></div>
      </section>
    </div>
  </div>
  <script src="Skeleton_Loaders.js?v=2"></script>
  <script src="Place_Cache.js?v=1"></script>
  <script src="Auth_Client.js?v=4"></script>
  <script src="Outings_Creations_Page.js?v=33"></script>
</body>
</html>
