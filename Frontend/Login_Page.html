<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign In | ChicagoInsider</title>
  <link rel="stylesheet" href="Auth.css?v=1" />
</head>
<body class="auth-page" data-auth-page="login">
  <main class="auth-scene">
    <section class="auth-card" aria-label="Sign in">
      <a class="auth-brand" href="Home_Page.html">
        <img src="assets/chicago-logo.svg" alt="" />
        ChicagoInsider
      </a>
      <h1>Welcome</h1>
      <p class="auth-subtitle">Please sign in to continue</p>

      <form class="auth-form" data-auth-form>
        <input name="email" type="email" placeholder="Email Address" autocomplete="email" required />
        <div class="auth-input-wrap">
          <input name="password" type="password" placeholder="Password" autocomplete="current-password" required />
          <button class="auth-toggle-password" type="button" data-toggle-password aria-label="Show password"></button>
        </div>
        <div class="auth-links">
          <a href="Forgot_Password_Page.html">Forgot Password?</a>
        </div>
        <p class="auth-message" id="authMessage" role="status"></p>
        <button class="auth-button" type="submit">Sign In</button>
      </form>

      <a class="auth-secondary" href="Sign_Up_Page.html">Create Account</a>
    </section>
  </main>

  <script src="Auth_Client.js?v=3"></script>
  <script src="Auth_Pages.js?v=1"></script>
</body>
</html>
