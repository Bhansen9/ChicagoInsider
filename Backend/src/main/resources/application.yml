server:
  port: ${SPRING_PORT:8080}

spring:
  config:
    import:
      - optional:file:../../.env[.properties]
      - optional:file:../.env[.properties]
      - optional:file:.env[.properties]
  application:
    name: chicago-insider-backend
  datasource:
    url: ${SUPABASE_DB_URL:jdbc:postgresql://localhost:5432/postgres}
    username: ${SUPABASE_DB_USER:postgres}
    password: ${SUPABASE_DB_PASSWORD:postgres}
    hikari:
      maximum-pool-size: ${DB_POOL_SIZE:10}
  flyway:
    enabled: ${FLYWAY_ENABLED:true}
    locations: classpath:db/migration
    baseline-on-migrate: ${FLYWAY_BASELINE_ON_MIGRATE:true}
    baseline-version: ${FLYWAY_BASELINE_VERSION:1}
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
        format_sql: false

supabase:
  jwt-secret: ${SUPABASE_JWT_SECRET:}

google:
  places:
    api-key: ${GOOGLE_PLACES_API_KEY:${GOOGLE_MAPS_API_KEY:}}
    text-search-url: https://places.googleapis.com/v1/places:searchText
    field-mask: places.id,places.displayName,places.formattedAddress,places.shortFormattedAddress,places.location,places.photos,places.primaryType,places.primaryTypeDisplayName,places.types,places.priceLevel,places.rating,places.userRatingCount,places.websiteUri,places.googleMapsUri,places.regularOpeningHours

app:
  cors:
    allowed-origins: ${CORS_ORIGINS:http://localhost:3000,http://127.0.0.1:3000,http://localhost:5500,http://127.0.0.1:5500,http://localhost:8080,http://127.0.0.1:8080}
  cache:
    search-ttl-minutes: ${PLACE_SEARCH_CACHE_TTL_MINUTES:60}
